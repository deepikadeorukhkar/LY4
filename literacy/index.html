<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sight Word Wall Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
font-family:'Comic Sans MS', cursive;
background:#dff6ff;
touch-action:none;
}

/* ================= LOGO SCREEN ================= */

#logoScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f3f3f3;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
animation:fadeOut 1s ease forwards;
animation-delay:2.5s;
}

#logoImg{
width:420px;
max-width:85%;
height:auto;
animation:logoZoom 1s ease;
}

@keyframes logoZoom{
0%{
transform:scale(0.6);
opacity:0;
}
100%{
transform:scale(1);
opacity:1;
}
}

@keyframes fadeOut{
from{
opacity:1;
visibility:visible;
}
to{
opacity:0;
visibility:hidden;
}
}

/* ================= GAME AREA ================= */

#game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
background:linear-gradient(to bottom,#bfe8ff,#fff3cf);
}

/* WALL */

#wall{
position:absolute;
top:0;
width:100%;
height:72%;
background:linear-gradient(#fff7ea,#ffe8c9);
}

/* FLOOR */

#floor{
position:absolute;
bottom:0;
width:100%;
height:28%;
background:#cb8d57;
}

/* WINDOWS */

.window{
position:absolute;
top:25px;
width:100px;
height:120px;
background:#87ceeb;
border:7px solid #8b5a2b;
border-radius:10px;
}

.window::before{
content:'';
position:absolute;
left:50%;
top:0;
width:5px;
height:100%;
background:#8b5a2b;
transform:translateX(-50%);
}

.window::after{
content:'';
position:absolute;
top:50%;
left:0;
width:100%;
height:5px;
background:#8b5a2b;
transform:translateY(-50%);
}

#window1{
left:2%;
}

#window2{
right:2%;
}

/* SUN */

#sun{
position:absolute;
top:10px;
right:18%;
font-size:75px;
}

/* FLOWERS */

.flower{
position:absolute;
bottom:12px;
font-size:45px;
}

#f1{
left:5%;
}

#f2{
right:5%;
}

/* TARGET */

#target{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:12px 24px;
border-radius:18px;
font-size:30px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.25);
z-index:100;
}

/* TRAY */

#trayContainer{
position:absolute;
left:1%;
top:95px;
width:300px;
background:#8d6e63;
padding:12px;
border-radius:16px;
box-shadow:0 5px 10px rgba(0,0,0,0.3);
}

#trayTitle{
text-align:center;
font-size:24px;
font-weight:bold;
color:white;
margin-bottom:10px;
}

/* NOTES GRID */

#tray{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
}

/* NOTES */

.note{
height:50px;
background:#fff176;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
cursor:grab;
user-select:none;
border:2px solid #fbc02d;
box-shadow:2px 3px 6px rgba(0,0,0,0.25);
touch-action:none;
transition:transform 0.2s;
}

.note:active{
transform:scale(1.08);
}

/* SOFT BOARD */

#softboard{
position:absolute;
top:70px;
left:66%;
transform:translateX(-50%);
width:42%;
height:440px;
background:#d39c62;
border:10px solid #75451d;
border-radius:18px;
box-shadow:0 6px 10px rgba(0,0,0,0.3);
padding:18px;
}

/* CHART */

#chart{
width:100%;
height:100%;
background:#fffef8;
border-radius:12px;
padding:12px;
display:flex;
flex-direction:column;
align-items:center;
}

#title{
font-size:34px;
font-weight:bold;
color:#ff4081;
margin-bottom:12px;
}

/* BOXES */

#boxes{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
width:100%;
height:100%;
}

.wordBox{
background:#fff6c5;
border:3px dashed #f9a825;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
color:#333;
}

/* FEEDBACK */

#feedback{
position:absolute;
top:90px;
left:50%;
transform:translateX(-50%);
font-size:90px;
z-index:200;
pointer-events:none;
}

/* MESSAGE */

#message{
position:absolute;
top:180px;
left:50%;
transform:translateX(-50%);
font-size:60px;
font-weight:bold;
color:#ff4081;
display:none;
z-index:300;
animation:bounce 1s infinite;
text-shadow:2px 2px 5px rgba(0,0,0,0.3);
}

@keyframes bounce{
0%,100%{
transform:translateX(-50%) scale(1);
}
50%{
transform:translateX(-50%) scale(1.1);
}
}

/* REPLAY BUTTON */

#replayBtn{
position:absolute;
top:290px;
left:50%;
transform:translateX(-50%);
padding:14px 30px;
font-size:28px;
font-family:'Comic Sans MS', cursive;
background:#ff9800;
color:white;
border:none;
border-radius:18px;
cursor:pointer;
display:none;
z-index:300;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

#replayBtn:hover{
background:#ff8c00;
}

/* MOBILE */

@media(max-width:950px){

#trayContainer{
width:230px;
}

.note{
font-size:18px;
height:42px;
}

#softboard{
width:50%;
height:360px;
left:68%;
top:90px;
}

#title{
font-size:26px;
}

.wordBox{
font-size:18px;
}

#target{
font-size:22px;
}

#message{
font-size:38px;
}

#replayBtn{
font-size:20px;
padding:10px 18px;
top:250px;
}

.window{
width:80px;
height:100px;
}

}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<!-- LOGO SCREEN -->

<div id="logoScreen">
<img 
src="https://raw.githubusercontent.com/deepikadeorukhkar/LY4/main/literacy/assets/innovine-logo.png" 
alt="Innovine Solutions Logo" 
id="logoImg">
</div>

<!-- GAME -->

<div id="game">

<div id="wall"></div>
<div id="floor"></div>

<div class="window" id="window1"></div>
<div class="window" id="window2"></div>

<div id="sun">☀️</div>

<div class="flower" id="f1">🌸🌼</div>
<div class="flower" id="f2">🌷🌸</div>

<div id="target">Loading...</div>

<div id="feedback"></div>

<div id="message">👏 GOOD JOB! 👏</div>

<button id="replayBtn">🔄 Replay Game</button>

<!-- TRAY -->

<div id="trayContainer">

<div id="trayTitle">Sticky Notes</div>

<div id="tray"></div>

</div>

<!-- BOARD -->

<div id="softboard">

<div id="chart">

<div id="title">Sight Word Wall</div>

<div id="boxes"></div>

</div>

</div>

<canvas id="confetti"></canvas>

</div>

<script>

/* WORDS */

const words=[
'the','are','to','this',
'that','all','no','go',
'and','his','her','they',
'was','our','your','here'
];

let currentIndex=0;
let currentWord="";

/* ELEMENTS */

const tray=document.getElementById("tray");
const boxes=document.getElementById("boxes");
const target=document.getElementById("target");
const feedback=document.getElementById("feedback");
const message=document.getElementById("message");
const replayBtn=document.getElementById("replayBtn");

/* CREATE BOXES */

function createBoxes(){

boxes.innerHTML='';

for(let i=0;i<16;i++){

const box=document.createElement("div");

box.className="wordBox";

boxes.appendChild(box);

}

}

createBoxes();

/* SPEAK */

function speak(text){

if('speechSynthesis' in window){

speechSynthesis.cancel();

const utter=
new SpeechSynthesisUtterance(text);

utter.rate=0.85;
utter.pitch=1.1;

speechSynthesis.speak(utter);

}

}

/* SHUFFLE */

function shuffle(arr){

for(let i=arr.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[arr[i],arr[j]]=[arr[j],arr[i]];

}

return arr;

}

/* CREATE NOTES */

function createNotes(){

tray.innerHTML='';

shuffle([...words]).forEach(word=>{

const note=document.createElement('div');

note.className='note';
note.innerText=word;
note.dataset.word=word;

enableDrag(note);

tray.appendChild(note);

});

}

/* DRAG */

function enableDrag(note){

let offsetX=0;
let offsetY=0;

function start(x,y){

note.style.position='fixed';
note.style.zIndex='999';

offsetX=x-note.getBoundingClientRect().left;
offsetY=y-note.getBoundingClientRect().top;

}

function move(x,y){

note.style.left=(x-offsetX)+'px';
note.style.top=(y-offsetY)+'px';

}

function end(x,y){

checkDrop(note,x,y);

}

/* MOUSE */

note.addEventListener('mousedown',e=>{

e.preventDefault();

start(e.clientX,e.clientY);

function mouseMove(ev){

move(ev.clientX,ev.clientY);

}

function mouseUp(ev){

document.removeEventListener('mousemove',mouseMove);
document.removeEventListener('mouseup',mouseUp);

end(ev.clientX,ev.clientY);

}

document.addEventListener('mousemove',mouseMove);
document.addEventListener('mouseup',mouseUp);

});

/* TOUCH */

note.addEventListener('touchstart',e=>{

const t=e.touches[0];

start(t.clientX,t.clientY);

});

note.addEventListener('touchmove',e=>{

const t=e.touches[0];

move(t.clientX,t.clientY);

});

note.addEventListener('touchend',e=>{

const t=e.changedTouches[0];

end(t.clientX,t.clientY);

});

}

/* CHECK DROP */

function checkDrop(note,x,y){

const allBoxes=
document.querySelectorAll('.wordBox');

let dropped=false;

allBoxes.forEach(box=>{

const rect=box.getBoundingClientRect();

if(
x>rect.left &&
x<rect.right &&
y>rect.top &&
y<rect.bottom &&
box.innerHTML===''
){

dropped=true;

if(note.dataset.word===currentWord){

correctAnswer(note,box);

}else{

wrongAnswer(note);

}

}

});

if(!dropped){

resetNote(note);

}

}

/* RESET */

function resetNote(note){

note.style.position='relative';
note.style.left='0px';
note.style.top='0px';
note.style.zIndex='1';

}

/* CORRECT */

function correctAnswer(note,box){

feedback.innerHTML='✅';

setTimeout(()=>{
feedback.innerHTML='';
},700);

playCorrect();

box.innerHTML=note.dataset.word;
box.style.background='#fff176';

note.remove();

currentIndex++;

if(currentIndex>=words.length){

finishGame();

}else{

setTimeout(nextWord,1000);

}

}

/* WRONG */

function wrongAnswer(note){

feedback.innerHTML='❌';

setTimeout(()=>{
feedback.innerHTML='';
},700);

playWrong();

resetNote(note);

speak(
"Try again. Find the word " +
currentWord
);

}

/* NEXT WORD */

function nextWord(){

currentWord=words[currentIndex];

target.innerHTML=
"Find: <span style='color:#ff5722'>" +
currentWord +
"</span>";

speak(
"Find the word " + currentWord
);

}

/* FINISH */

function finishGame(){

message.style.display='block';

replayBtn.style.display='block';

playCelebration();

startConfetti();

speak(
"Good job! You completed the sight word wall."
);

}

/* RESTART */

function restartGame(){

currentIndex=0;

message.style.display='none';
replayBtn.style.display='none';
feedback.innerHTML='';

createBoxes();
createNotes();

setTimeout(()=>{
nextWord();
},1000);

}

replayBtn.addEventListener('click',restartGame);

/* SOUNDS */

function playCorrect(){

const ctx=
new(window.AudioContext||
window.webkitAudioContext)();

const osc=ctx.createOscillator();
const gain=ctx.createGain();

osc.type='triangle';
osc.frequency.value=700;

osc.connect(gain);
gain.connect(ctx.destination);

osc.start();

gain.gain.exponentialRampToValueAtTime(
0.0001,
ctx.currentTime+0.4
);

osc.stop(ctx.currentTime+0.4);

}

function playWrong(){

const ctx=
new(window.AudioContext||
window.webkitAudioContext)();

const osc=ctx.createOscillator();
const gain=ctx.createGain();

osc.type='sawtooth';
osc.frequency.value=180;

osc.connect(gain);
gain.connect(ctx.destination);

osc.start();

gain.gain.exponentialRampToValueAtTime(
0.0001,
ctx.currentTime+0.5
);

osc.stop(ctx.currentTime+0.5);

}

function playCelebration(){

const ctx=
new(window.AudioContext||
window.webkitAudioContext)();

for(let i=0;i<8;i++){

const osc=ctx.createOscillator();
const gain=ctx.createGain();

osc.type='triangle';
osc.frequency.value=450+(i*100);

osc.connect(gain);
gain.connect(ctx.destination);

osc.start(ctx.currentTime+i*0.08);

gain.gain.exponentialRampToValueAtTime(
0.0001,
ctx.currentTime+i*0.08+0.5
);

osc.stop(ctx.currentTime+i*0.08+0.5);

}

}

/* CONFETTI */

const canvas=
document.getElementById("confetti");

const ctx=
canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let confetti=[];

function startConfetti(){

confetti=[];

for(let i=0;i<220;i++){

confetti.push({

x:Math.random()*canvas.width,
y:Math.random()*-canvas.height,
r:Math.random()*6+4,
d:Math.random()*200,
color:`hsl(${Math.random()*360},100%,50%)`

});

}

animateConfetti();

}

function animateConfetti(){

ctx.clearRect(0,0,canvas.width,canvas.height);

confetti.forEach(p=>{

ctx.fillStyle=p.color;

ctx.fillRect(p.x,p.y,p.r,p.r);

p.y+=2;
p.x+=Math.sin(p.d);

if(p.y>canvas.height){

p.y=-10;

}

});

requestAnimationFrame(animateConfetti);

}

/* START GAME */

function startGame(){

createNotes();

setTimeout(()=>{

speak(
"Pin the sight word on the sight word wall."
);

setTimeout(nextWord,2500);

},700);

}

/* START AFTER LOGO */

setTimeout(()=>{
startGame();
},3000);

</script>

</body>
</html>
