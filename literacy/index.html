<body>

<!-- LOGO SCREEN -->
<div id="logoScreen">
  <img src="innovine-logo.png" alt="Logo" id="logoImg">
</div>

<div id="game">

<div id="wall"></div>
<div id="floor"></div>

<div class="window" id="window1"></div>
<div class="window" id="window2"></div>

<div id="sun">☀️</div>

<div class="flower" id="f1">🌸🌼</div>
<div class="flower" id="f2">🌷🌸</div>

<div id="target">Loading...</div>

<div id="feedback"></div>

<div id="message">👏 GOOD JOB! 👏</div>

<button id="replayBtn">🔄 Replay Game</button>

<div id="trayContainer">
<div id="trayTitle">Sticky Notes</div>
<div id="tray"></div>
</div>

<div id="softboard">
<div id="chart">
<div id="title">Sight Word Wall</div>
<div id="boxes"></div>
</div>
</div>

<canvas id="confetti"></canvas>

</div>

<script>

const words=[
'the','are','to','this',
'that','all','no','go',
'and','his','her','they',
'was','our','your','here'
];

let currentIndex=0;
let currentWord="";

const tray=document.getElementById("tray");
const boxes=document.getElementById("boxes");
const target=document.getElementById("target");
const feedback=document.getElementById("feedback");
const message=document.getElementById("message");
const replayBtn=document.getElementById("replayBtn");

function createBoxes(){

boxes.innerHTML='';

for(let i=0;i<16;i++){

const box=document.createElement("div");
box.className="wordBox";
boxes.appendChild(box);

}

}

createBoxes();

function speak(text){

if('speechSynthesis' in window){

speechSynthesis.cancel();

const utter=new SpeechSynthesisUtterance(text);
utter.rate=0.85;
utter.pitch=1.1;

speechSynthesis.speak(utter);

}

}

function shuffle(arr){

for(let i=arr.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];

}

return arr;

}

function createNotes(){

tray.innerHTML='';

shuffle([...words]).forEach(word=>{

const note=document.createElement('div');

note.className='note';
note.innerText=word;
note.dataset.word=word;

enableDrag(note);

tray.appendChild(note);

});

}

function enableDrag(note){

let offsetX=0;
let offsetY=0;

function start(x,y){

note.style.position='fixed';
note.style.zIndex='999';

offsetX=x-note.getBoundingClientRect().left;
offsetY=y-note.getBoundingClientRect().top;

}

function move(x,y){

note.style.left=(x-offsetX)+'px';
note.style.top=(y-offsetY)+'px';

}

function end(x,y){
checkDrop(note,x,y);
}

note.addEventListener('mousedown',e=>{

e.preventDefault();
start(e.clientX,e.clientY);

function mouseMove(ev){
move(ev.clientX,ev.clientY);
}

function mouseUp(ev){

document.removeEventListener('mousemove',mouseMove);
document.removeEventListener('mouseup',mouseUp);

end(ev.clientX,ev.clientY);

}

document.addEventListener('mousemove',mouseMove);
document.addEventListener('mouseup',mouseUp);

});

note.addEventListener('touchstart',e=>{
const t=e.touches[0];
start(t.clientX,t.clientY);
});

note.addEventListener('touchmove',e=>{
const t=e.touches[0];
move(t.clientX,t.clientY);
});

note.addEventListener('touchend',e=>{
const t=e.changedTouches[0];
end(t.clientX,t.clientY);
});

}

function checkDrop(note,x,y){

const allBoxes=document.querySelectorAll('.wordBox');

let dropped=false;

allBoxes.forEach(box=>{

const rect=box.getBoundingClientRect();

if(
x>rect.left &&
x<rect.right &&
y>rect.top &&
y<rect.bottom &&
box.innerHTML===''
){

dropped=true;

if(note.dataset.word===currentWord){
correctAnswer(note,box);
}else{
wrongAnswer(note);
}

}

});

if(!dropped){
resetNote(note);
}

}

function resetNote(note){

note.style.position='relative';
note.style.left='0px';
note.style.top='0px';
note.style.zIndex='1';

}

function correctAnswer(note,box){

feedback.innerHTML='✅';

setTimeout(()=>{
feedback.innerHTML='';
},700);

playCorrect();

box.innerHTML=note.dataset.word;
box.style.background='#fff176';

note.remove();

currentIndex++;

if(currentIndex>=words.length){
finishGame();
}else{
setTimeout(nextWord,1000);
}

}

function wrongAnswer(note){

feedback.innerHTML='❌';

setTimeout(()=>{
feedback.innerHTML='';
},700);

playWrong();

resetNote(note);

speak("Try again. Find the word " + currentWord);

}

function nextWord(){

currentWord=words[currentIndex];

target.innerHTML=
"Find: <span style='color:#ff5722'>" +
currentWord +
"</span>";

speak("Find the word " + currentWord);

}

function finishGame(){

message.style.display='block';
replayBtn.style.display='block';

playCelebration();
startConfetti();

speak("Good job! You completed the sight word wall.");

}

function restartGame(){

currentIndex=0;

message.style.display='none';
replayBtn.style.display='none';
feedback.innerHTML='';

createBoxes();
createNotes();

setTimeout(()=>{
nextWord();
},1000);

}

replayBtn.addEventListener('click',restartGame);

function playCorrect(){

const ctx=new(window.AudioContext||window.webkitAudioContext)();

const osc=ctx.createOscillator();
const gain=ctx.createGain();

osc.type='triangle';
osc.frequency.value=700;

osc.connect(gain);
gain.connect(ctx.destination);

osc.start();

gain.gain.exponentialRampToValueAtTime(
0.0001,
ctx.currentTime+0.4
);

osc.stop(ctx.currentTime+0.4);

}

function playWrong(){

const ctx=new(window.AudioContext||window.webkitAudioContext)();

const osc=ctx.createOscillator();
const gain=ctx.createGain();

osc.type='sawtooth';
osc.frequency.value=180;

osc.connect(gain);
gain.connect(ctx.destination);

osc.start();

gain.gain.exponentialRampToValueAtTime(
0.0001,
ctx.currentTime+0.5
);

osc.stop(ctx.currentTime+0.5);

}

function playCelebration(){

const ctx=new(window.AudioContext||window.webkitAudioContext)();

for(let i=0;i<8;i++){

const osc=ctx.createOscillator();
const gain=ctx.createGain();

osc.type='triangle';
osc.frequency.value=450+(i*100);

osc.connect(gain);
gain.connect(ctx.destination);

osc.start(ctx.currentTime+i*0.08);

gain.gain.exponentialRampToValueAtTime(
0.0001,
ctx.currentTime+i*0.08+0.5
);

osc.stop(ctx.currentTime+i*0.08+0.5);

}

}

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let confetti=[];

function startConfetti(){

confetti=[];

for(let i=0;i<220;i++){

confetti.push({

x:Math.random()*canvas.width,
y:Math.random()*-canvas.height,
r:Math.random()*6+4,
d:Math.random()*200,
color:`hsl(${Math.random()*360},100%,50%)`

});

}

animateConfetti();

}

function animateConfetti(){

ctx.clearRect(0,0,canvas.width,canvas.height);

confetti.forEach(p=>{

ctx.fillStyle=p.color;
ctx.fillRect(p.x,p.y,p.r,p.r);

p.y+=2;
p.x+=Math.sin(p.d);

if(p.y>canvas.height){
p.y=-10;
}

});

requestAnimationFrame(animateConfetti);

}

function startGame(){

createNotes();

setTimeout(()=>{

speak("Pin the sight word on the sight word wall.");

setTimeout(nextWord,2500);

},700);

}

setTimeout(()=>{
startGame();
},3000);

</script>

</body>
</html>
